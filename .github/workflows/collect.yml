name: Daily Collect

on:
  schedule:
    # JST 15:00 = UTC 06:00
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run collect

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.json
          git diff --staged --quiet || git commit -m "chore: update latest.json [skip ci]"
          git push
